{% extends "base.html" %}
{% block content %}
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #000;
    color: #fff;
  }

  #graph {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  svg {
    width: 100%;
    height: 100%;
  }

  .link {
    stroke: #00ff41;
    stroke-opacity: 0.8;
  }

  .node {
    fill: #ffc107;
    stroke: #fff;
    stroke-width: 1px;
  }

  .label {
    fill: #fff;
    font-size: 12px;
    pointer-events: none;
  }
</style>

<div id="graph"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
  const container = d3.select('#graph');
  const width = window.innerWidth;
  const height = window.innerHeight;

  const svg = container.append('svg')
    .attr('viewBox', [0, 0, width, height]);

  fetch('/api/wiki/graph_data')
    .then(res => res.json())
    .then(data => {
      const nodes = data.nodes || [];
      const links = data.links || [];

      const simulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id).distance(100).strength(0.7))
        .force('charge', d3.forceManyBody().strength(-300))
        .force('center', d3.forceCenter(width / 2, height / 2));

      const link = svg.append('g')
        .attr('stroke', '#00ff41')
        .attr('stroke-opacity', 0.8)
        .selectAll('line')
        .data(links)
        .join('line')
        .attr('class', 'link');

      const node = svg.append('g')
        .selectAll('circle')
        .data(nodes)
        .join('circle')
        .attr('class', 'node')
        .attr('r', d => 5 + (Number(d.max_pulse_strength || 0) * 15))
        .attr('fill', d => {
          const behavior = (d.behavior || 'unknown').toLowerCase();
          const map = {
            chaotic: '#ef4444',
            escalating: '#f59e0b',
            damping: '#f59e0b',
            steady: '#10b981',
            unknown: '#6b7280'
          };
          return map[behavior] || map.unknown;
        })
        .attr('stroke', d => {
          let f = {};
          try { f = d.features ? (typeof d.features === 'string' ? JSON.parse(d.features) : d.features) : {}; } catch (_) { f = {}; }
          const trend = Number(f.trend || 0);
          if (trend > 0) return '#f59e0b';
          if (trend < 0) return '#3b82f6';
          return '#94a3b8';
        })
        .style('filter', d => {
          let f = {};
          try { f = d.features ? (typeof d.features === 'string' ? JSON.parse(d.features) : d.features) : {}; } catch (_) { f = {}; }
          return (Number(f.volatility || 0) > 0.6)
            ? 'drop-shadow(0 0 5px rgba(239,68,68,0.5))'
            : null;
        })
        .attr('cursor', 'pointer')
        .call(d3.drag()
          .on('start', (event, d) => {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
          })
          .on('drag', (event, d) => {
            d.fx = event.x; d.fy = event.y;
          })
          .on('end', (event, d) => {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null; d.fy = null;
          })
        )
        .on('click', (event, d) => {
          if (d.slug) {
            window.location.href = '/wiki/article/' + encodeURIComponent(d.slug);
          }
        });

      const label = svg.append('g')
        .selectAll('text')
        .data(nodes)
        .join('text')
        .attr('class', 'label')
        .text(d => d.title || d.id);

      simulation.on('tick', () => {
        link
          .attr('x1', d => d.source.x)
          .attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x)
          .attr('y2', d => d.target.y);

        node
          .attr('cx', d => d.x)
          .attr('cy', d => d.y);

        label
          .attr('x', d => d.x + 12)
          .attr('y', d => d.y + 4);
      });
    })
    .catch(error => {
      console.error('Graph fetch failed', error);
      container.append('div').text('Failed to load graph data').style('color', 'red');
    });
</script>
{% endblock %}
